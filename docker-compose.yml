services:
  postgres:
    image: postgres:18-alpine
    container_name: alfood-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-alfood}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-alfood}
      POSTGRES_DB: ${DB_DATABASE:-alfood}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # postgres:18+ stores data in a versioned subdirectory; mount the parent.
      - alfood_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-alfood} -d ${DB_DATABASE:-alfood}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  alfood_pgdata:
